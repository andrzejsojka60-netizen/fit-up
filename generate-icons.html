<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生成 Fit Up PWA 图标</title>
<style>
  body { font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; max-width: 520px; margin: 2rem auto; padding: 1rem; background: #f6f8fa; }
  h2 { color: #0969da; }
  .preview { display: flex; gap: 1.2rem; flex-wrap: wrap; margin: 1.2rem 0; justify-content: center; }
  .preview-item { text-align: center; }
  .preview canvas { border: 1px solid #d8dee4; border-radius: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .preview p { font-size: .78rem; color: #656d76; margin-top: 6px; }
  button {
    padding: .75rem 2rem; font-size: 1rem; border: none; border-radius: 10px;
    background: #0969da; color: #fff; cursor: pointer; font-weight: 600;
    display: block; margin: 1.2rem auto; transition: background .15s;
  }
  button:hover { background: #0860ca; }
  button:active { transform: scale(.97); }
  .note { font-size: .82rem; color: #656d76; margin-top: 1rem; background: #e8f1fd; padding: .8rem 1rem; border-radius: 10px; line-height: 1.6; }
  .note code { background: rgba(9,105,218,.1); padding: 1px 6px; border-radius: 4px; font-size: .8rem; }
</style>
</head>
<body>
<h2>💪 生成 PWA 图标 — Fit Up</h2>
<p style="color:#656d76">点击按钮生成 192×192 和 512×512 的 PNG 图标，下载后放到项目根目录。</p>

<div class="preview">
  <div class="preview-item">
    <canvas id="c192" width="192" height="192"></canvas>
    <p>icon-192.png</p>
  </div>
  <div class="preview-item">
    <canvas id="c512" width="512" height="512"></canvas>
    <p>icon-512.png</p>
  </div>
</div>

<button onclick="downloadIcons()">⬇️ 下载图标文件</button>

<div class="note">
  ⚠️ 下载后将 <code>icon-192.png</code> 和 <code>icon-512.png</code> 放到<br>
  <code>d:\健身计划wPA\</code> 目录下即可覆盖旧图标。
</div>

<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const u = size / 100; // unit

  // Background — rounded rect with gradient
  const r = size * 0.16;
  const grad = ctx.createLinearGradient(0, 0, 0, size);
  grad.addColorStop(0, '#1a8cff');
  grad.addColorStop(1, '#0659c7');

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Barbell bar
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 4.5 * u;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(16 * u, 50 * u);
  ctx.lineTo(84 * u, 50 * u);
  ctx.stroke();

  // Weight plates (left side)
  ctx.fillStyle = '#ffffff';
  [
    [12, 28, 7, 15],
    [8, 46, 10, 4.5],
  ].forEach(([x, y, w, h]) => {
    ctx.fillRect(x * u, y * u, w * u, h * u);
  });

  // Weight plates (right side)
  [
    [80, 28, 7, 15],
    [82, 46, 10, 4.5],
  ].forEach(([x, y, w, h]) => {
    ctx.fillRect(x * u, y * u, w * u, h * u);
  });

  // Rounded caps on plates
  ctx.fillStyle = '#ffffff';
  [
    [11.5 * u, 28 * u, 3.5 * u, 15 * u],
    [85.5 * u, 28 * u, 3.5 * u, 15 * u],
  ].forEach(([x, y, w, h]) => {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 1.5 * u);
    ctx.fill();
  });

  // Small dumbbell accent
  const dbY = 72 * u;
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  // Left weight
  ctx.fillRect(30 * u, dbY - 5 * u, 6 * u, 10 * u);
  // Right weight
  ctx.fillRect(64 * u, dbY - 5 * u, 6 * u, 10 * u);
  // Bar
  ctx.fillRect(36 * u, dbY - 1.5 * u, 28 * u, 3 * u);

  // Sparkle dots
  ctx.fillStyle = 'rgba(255,255,255,.6)';
  [
    [22, 18, 2.5], [78, 16, 2], [80, 62, 2.2], [18, 64, 1.8],
  ].forEach(([sx, sy, sr]) => {
    ctx.beginPath();
    ctx.arc(sx * u, sy * u, sr * u, 0, Math.PI * 2);
    ctx.fill();
  });
}

drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);

function downloadIcons() {
  [['c192', 'icon-192.png'], ['c512', 'icon-512.png']].forEach(([id, name]) => {
    const a = document.createElement('a');
    a.download = name;
    a.href = document.getElementById(id).toDataURL('image/png');
    a.click();
  });
  alert('✅ 图标下载完成！\n\n请将 icon-192.png 和 icon-512.png 放到\n项目根目录 d:\\健身计划wPA\\ 下');
}
</script>
</body>
</html>
