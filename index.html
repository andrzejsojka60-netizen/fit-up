<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Fit Up · 健身训练</title>
<meta name="theme-color" content="#0969da">
<meta name="description" content="12周推拉蹲渐进式健身训练计划 · 1RM自动推荐 · 移动端优化">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fit Up">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json" crossorigin="use-credentials">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon-precomposed" href="icon-192.png">
<style>
:root {
  --bg: #f6f8fa;
  --surface: #ffffff;
  --surface-hover: #f3f4f6;
  --border: #d8dee4;
  --text: #1f2328;
  --text2: #656d76;
  --accent: #0969da;
  --accent-hover: #0860ca;
  --accent2: #1a7f37;
  --accent2-hover: #166b2e;
  --gym: #0969da;
  --warn: #9a6700;
  --danger: #cf222e;
  --core: #8250df;
  --correct: #1b7c83;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow-sm: 0 1px 2px rgba(31,35,40,.04), 0 1px 0 rgba(31,35,40,.06);
  --shadow-md: 0 2px 8px rgba(31,35,40,.08), 0 1px 2px rgba(31,35,40,.06);
  --shadow-lg: 0 4px 16px rgba(31,35,40,.1), 0 2px 4px rgba(31,35,40,.06);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: max(80px, calc(env(safe-area-inset-bottom, 0px) + 60px));
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  -webkit-touch-callout: none;
  overscroll-behavior: none;
}

/* ── Header ── */
header {
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  padding: 16px 16px 12px;
  position: sticky; top: 0; z-index: 10;
}
header .top-row { display: flex; justify-content: space-between; align-items: center; }
header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -.01em; }
header .phase-badge {
  background: var(--accent); color: #fff;
  padding: 4px 12px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 600;
  box-shadow: 0 1px 2px rgba(9,105,218,.25);
}
header .week-row {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px; font-size: 0.85rem; color: var(--text2);
}
header .week-row button {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  width: 36px; height: 36px; border-radius: 50%;
  font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
header .week-row button:hover { background: var(--surface-hover); }
header .week-row button:active { background: var(--accent); border-color: var(--accent); color: #fff; }
	header .week-row .today-btn {
	  width: auto; padding: 0 14px; border-radius: 14px; font-size: 0.75rem;
	  font-weight: 600; white-space: nowrap; margin-left: auto;
	  background: var(--accent2); color: #fff; border-color: var(--accent2);
	  opacity: 0.85; transition: opacity .15s;
	}
	header .week-row .today-btn:hover { opacity: 1; }
	header .week-row .today-btn:active { background: var(--accent2-hover); border-color: var(--accent2-hover); opacity: 1; }

/* ── Day Navigation ── */
.day-nav {
  display: flex; gap: 6px; padding: 10px 14px;
  background: var(--bg); overflow-x: auto;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 86px; z-index: 9;
  scrollbar-width: none;
}
.day-nav::-webkit-scrollbar { display: none; }
.day-nav button {
  flex: 0 0 auto; padding: 10px 18px; border-radius: 22px;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text2); font-size: 0.82rem; cursor: pointer;
  white-space: nowrap; transition: all .2s;
  box-shadow: var(--shadow-sm); user-select: none;
  -webkit-user-select: none;
}
.day-nav button:hover { border-color: var(--accent); color: var(--accent); }
.day-nav button.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
  font-weight: 600; box-shadow: 0 2px 6px rgba(9,105,218,.3);
}
.day-nav button.today {
  border-color: var(--accent2); color: var(--accent2);
  box-shadow: 0 0 0 2px rgba(26,127,55,.12);
}

/* ── Main Content ── */
main { padding: 16px 14px; }
.day-header { margin-bottom: 16px; }
.day-header h2 { font-size: 1.2rem; font-weight: 700; letter-spacing: -.01em; }
.day-header .meta { display: flex; gap: 10px; align-items: center; margin-top: 6px; font-size: 0.8rem; }
.day-header .location {
  padding: 3px 10px; border-radius: 12px; font-weight: 600; font-size: 0.78rem;
  background: rgba(9,105,218,.1); color: var(--gym);
}
.day-header .location.rest {
  background: rgba(207,34,46,.08); color: var(--danger);
}
.day-header .date-str { color: var(--text2); font-weight: 500; }

/* ── Exercise Cards ── */
.exercise-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
  cursor: pointer; transition: all .2s ease;
  box-shadow: var(--shadow-sm);
}
.exercise-card:hover { border-color: var(--accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.exercise-card:active { background: var(--surface-hover); transform: none; }
.exercise-card.superset-card {
  border-left: 4px solid var(--warn);
}
.exercise-card.expanded { border-color: var(--accent); box-shadow: var(--shadow-md); }
.exercise-card .ex-top { display: flex; justify-content: space-between; align-items: flex-start; }
.exercise-card .ex-name { font-weight: 600; font-size: 0.95rem; line-height: 1.3; }
.exercise-card .ex-cat {
  font-size: 0.68rem; padding: 3px 10px; border-radius: 10px;
  background: rgba(9,105,218,.08); color: var(--accent);
  flex-shrink: 0; margin-left: 8px; font-weight: 700;
  letter-spacing: .02em;
}
.exercise-card .ex-cat.core { background: rgba(130,80,223,.1); color: var(--core); }
.exercise-card .ex-cat.correct { background: rgba(27,124,131,.1); color: var(--correct); }
.exercise-card .ex-target {
  display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 8px;
  font-size: 0.78rem; color: var(--text2);
}
.exercise-card .ex-target span {
  white-space: nowrap; display: inline-flex; align-items: center; gap: 2px;
}
.exercise-card .ex-notes {
  font-size: 0.76rem; color: var(--text2); margin-top: 4px; font-style: italic;
  line-height: 1.4;
}
.exercise-card .ex-superset {
  font-size: 0.7rem; color: var(--warn); margin-top: 2px; font-weight: 600;
}
.exercise-card .record-area {
  display: none; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 14px;
}
.exercise-card.expanded .record-area { display: block; animation: fadeIn .2s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* ── Set Rows ── */
.set-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.set-row .set-label {
  font-size: 0.78rem; color: var(--text2); width: 26px; flex-shrink: 0;
  font-weight: 600; text-align: center;
}
.set-row input {
  background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); padding: 10px 8px; font-size: 16px; width: 0; flex: 1;
  text-align: center; min-width: 0; transition: all .15s;
  font-family: var(--font);
}
.set-row input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(9,105,218,.12);
}
.set-row .input-label { font-size: 0.7rem; color: var(--text2); flex-shrink: 0; font-weight: 500; }
.set-row .set-done, .set-row .set-done-btn {
  width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border);
  background: transparent; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 1rem;
  transition: all .15s; color: transparent;
}
.set-row .set-done:hover, .set-row .set-done-btn:hover { border-color: var(--accent2); background: rgba(26,127,55,.08); }
.set-row .set-done.checked, .set-row .set-done-btn.checked {
  background: var(--accent2); border-color: var(--accent2); color: #fff;
  box-shadow: 0 1px 4px rgba(26,127,55,.3);
}
.set-row.has-data .set-done, .set-row.has-data .set-done-btn { color: var(--text2); }
.set-row.has-data .set-done:hover, .set-row.has-data .set-done-btn:hover { color: var(--accent2); }

/* ── Record Inputs ── */
.ex-notes-input {
  width: 100%; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); padding: 10px 12px;
  font-size: 16px; margin-top: 4px; resize: vertical; min-height: 38px;
  font-family: var(--font); transition: all .15s;
}
.ex-notes-input:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(9,105,218,.12);
}
.ex-notes-input::placeholder { color: var(--text2); opacity: .7; }
.add-set-btn {
  background: var(--bg); border: 1.5px dashed var(--border); color: var(--text2);
  padding: 8px 14px; border-radius: var(--radius-sm); font-size: 0.78rem;
  cursor: pointer; margin-top: 6px; transition: all .15s; width: 100%;
  font-weight: 500;
}
.add-set-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(9,105,218,.04); }

/* ── Save Button ── */
.save-btn {
  display: block; width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--accent), var(--accent-hover));
  color: #fff; border: none;
  border-radius: var(--radius); font-size: 1rem; font-weight: 700;
  cursor: pointer; margin: 18px 0; transition: all .2s;
  box-shadow: 0 2px 8px rgba(9,105,218,.25);
  letter-spacing: .02em;
}
.save-btn:hover { box-shadow: 0 4px 16px rgba(9,105,218,.35); transform: translateY(-1px); }
.save-btn:active { opacity: .9; transform: none; }
.save-btn:disabled { opacity: .4; box-shadow: none; }
.save-feedback {
  text-align: center; font-size: 0.85rem; padding: 10px;
  border-radius: var(--radius-sm); margin-bottom: 14px; font-weight: 500;
}
.save-feedback.success { background: rgba(26,127,55,.1); color: var(--accent2); }

/* ── Bottom Navigation ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; z-index: 20;
  box-shadow: 0 -1px 4px rgba(31,35,40,.06);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bottom-nav button {
  flex: 1; padding: 10px 8px 14px; background: transparent; border: none;
  color: var(--text2); font-size: 0.72rem; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: color .15s; position: relative;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.bottom-nav button .nav-icon { font-size: 1.25rem; transition: transform .15s; }
.bottom-nav button.active { color: var(--accent); }
.bottom-nav button.active .nav-icon { transform: scale(1.1); }
.bottom-nav button.active::after {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 24px; height: 3px; background: var(--accent); border-radius: 0 0 3px 3px;
}

/* ── History View ── */
.history-view { display: none; }
.history-view.active { display: block; }
.history-summary { display: flex; gap: 10px; margin-bottom: 18px; }
.history-summary .stat {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 12px; text-align: center;
  box-shadow: var(--shadow-sm);
}
.history-summary .stat .val { font-size: 1.5rem; font-weight: 700; color: var(--accent); line-height: 1.1; }
.history-summary .stat .lbl { font-size: 0.7rem; color: var(--text2); margin-top: 4px; font-weight: 500; }
.history-list .history-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 10px;
  cursor: pointer; transition: all .15s; box-shadow: var(--shadow-sm);
}
.history-list .history-item:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
.history-item .hi-date { font-weight: 600; font-size: 0.95rem; }
.history-item .hi-day { font-size: 0.8rem; color: var(--text2); margin-top: 3px; }
.history-item .hi-exercises { font-size: 0.78rem; color: var(--text2); margin-top: 4px; }
.history-item .hi-records { font-size: 0.82rem; color: var(--accent2); margin-top: 3px; font-weight: 500; }

/* ── History Detail Overlay ── */
.history-detail-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
  z-index: 30; justify-content: center; align-items: flex-end;
  backdrop-filter: blur(2px);
}
.history-detail-overlay.active { display: flex; animation: fadeIn .2s ease; }
.history-detail-panel {
  background: var(--surface); border-radius: 16px 16px 0 0;
  width: 100%; max-height: 80vh; overflow-y: auto; padding: 24px 18px;
  box-shadow: 0 -4px 24px rgba(0,0,0,.12);
}
.history-detail-panel h3 { margin-bottom: 14px; font-size: 1.1rem; }
.history-detail-panel .close-btn {
  position: sticky; top: 0; float: right;
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  width: 40px; height: 40px; border-radius: 50%; font-size: 1.1rem;
  cursor: pointer; transition: all .15s; z-index: 1;
}
.history-detail-panel .close-btn:hover { background: var(--danger); border-color: var(--danger); color: #fff; }
.hd-exercise {
  margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.hd-exercise:last-child { border-bottom: none; }
.hd-exercise .hd-name { font-weight: 600; font-size: 0.95rem; }
.hd-exercise .hd-sets { font-size: 0.82rem; color: var(--text2); margin-top: 6px; line-height: 1.6; }
.hd-exercise .hd-notes { font-size: 0.78rem; color: var(--warn); margin-top: 4px; }

/* ── Settings View ── */
.settings-view { display: none; }
.settings-view.active { display: block; }
.settings-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.settings-card h3 { font-size: 0.95rem; margin-bottom: 12px; font-weight: 700; }
.settings-card label { display: block; font-size: 0.8rem; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
.settings-card input, .settings-card select {
  width: 100%; background: var(--bg); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); padding: 10px 12px;
  font-size: 16px; margin-bottom: 12px; font-family: var(--font);
  transition: all .15s;
}
.settings-card input:focus, .settings-card select:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(9,105,218,.12);
}
.settings-card .day-check-group { display: flex; flex-wrap: wrap; gap: 8px; }
.settings-card .day-check {
  padding: 11px 18px; border: 1.5px solid var(--border); border-radius: 20px;
  font-size: 0.82rem; cursor: pointer; user-select: none; transition: all .15s;
  font-weight: 500; background: var(--bg);
  -webkit-tap-highlight-color: transparent;
}
.settings-card .day-check:hover { border-color: var(--accent); }
.settings-card .day-check.checked {
  background: var(--accent); color: #fff; border-color: var(--accent);
  box-shadow: 0 1px 4px rgba(9,105,218,.25);
}
.settings-card button {
  padding: 10px 20px; background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm); font-size: 0.9rem;
  font-weight: 600; cursor: pointer; transition: all .15s;
  box-shadow: 0 1px 4px rgba(9,105,218,.2);
}
.settings-card button:hover { box-shadow: 0 2px 8px rgba(9,105,218,.3); }
.export-btn {
  padding: 9px 18px; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.82rem;
  cursor: pointer; margin-top: 8px; transition: all .15s; font-weight: 500;
}
.export-btn:hover { background: var(--surface-hover); }

/* 1RM 极限重量输入 */
.one-rm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; }
.one-rm-item { display: flex; align-items: center; gap: 6px; }
.one-rm-item label { margin-bottom: 0 !important; white-space: nowrap; min-width: 70px; font-size: 0.78rem !important; }
.one-rm-item input {
  width: 70px !important; margin-bottom: 0 !important; padding: 6px 8px !important;
  font-size: 0.82rem !important; text-align: center;
}
.one-rm-item .unit { font-size: 0.75rem; color: var(--text2); flex-shrink: 0; }

/* 训练偏好设置网格 */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.settings-field { display: flex; flex-direction: column; gap: 4px; }
.settings-field label { font-size: 0.75rem; color: var(--text2); margin-bottom: 0 !important; }
.settings-field select {
  font-size: 0.85rem; padding: 8px 10px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg); color: var(--text);
  cursor: pointer; appearance: auto; width: 100%;
}
.settings-field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(9,105,218,.1); }

/* 每日状态条 */
.readiness-bar {
  display: flex; align-items: center; gap: 8px; padding: 8px 14px;
  background: var(--bg); border-radius: var(--radius); margin-bottom: 12px;
  border: 1px solid var(--border); flex-wrap: wrap;
}
.readiness-label { font-size: 0.78rem; color: var(--text2); font-weight: 600; white-space: nowrap; }
.readiness-btn {
  flex: 1; min-width: 70px; padding: 7px 10px; border: 2px solid var(--border);
  border-radius: 20px; font-size: 0.75rem; cursor: pointer; background: var(--bg);
  color: var(--text); transition: all .15s; font-weight: 500;
}
.readiness-btn:hover { background: var(--surface-hover); }
.readiness-btn.active-green { border-color: #34c759; background: #e8f8ed; color: #1b7a30; }
.readiness-btn.active-yellow { border-color: #ff9500; background: #fff3e0; color: #b26500; }
.readiness-btn.active-red { border-color: #ff3b30; background: #fdeaea; color: #b82020; }

/* 推荐重量标签 */
.rec-weight {
  background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
  color: #2e7d32; font-size: 0.78rem; font-weight: 600;
  padding: 2px 10px; border-radius: 14px; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 3px;
}
.rec-weight.deload { background: linear-gradient(135deg, #fff3e0, #ffe0b2); color: #e65100; }
.progression-badge {
  background: var(--accent); color: #fff; font-size: 0.68rem; font-weight: 700;
  padding: 1px 7px; border-radius: 10px; margin-left: 2px;
  animation: pulse-badge 1.5s ease-in-out infinite;
}
@keyframes pulse-badge {
  0%,100% { opacity: 1; } 50% { opacity: 0.6; }
}

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 40px 16px; color: var(--text2);
}
.empty-state .icon { font-size: 3.5rem; margin-bottom: 12px; opacity: .6; }

/* ── Warmup Block ── */
.warmup-block {
  background: var(--surface); border: 1px solid var(--border);
  border-left: 4px solid var(--accent);
  border-radius: var(--radius); padding: 12px 16px; margin-bottom: 12px;
  font-size: 0.82rem; color: var(--text2); cursor: pointer;
  user-select: none; transition: all .15s; box-shadow: var(--shadow-sm);
}
.warmup-block:hover { box-shadow: var(--shadow-md); }
.warmup-block .warmup-header { display: flex; justify-content: space-between; align-items: center; }
.warmup-block .warmup-header strong { color: var(--accent); font-size: 0.9rem; }
.warmup-block .warmup-toggle {
  font-size: 0.72rem; color: var(--text2); background: var(--bg);
  padding: 2px 10px; border-radius: 10px; transition: all .15s;
}
.warmup-block .warmup-text { margin-top: 10px; line-height: 1.7; }
.warmup-block .warmup-text .warmup-step { padding: 3px 0; }
.warmup-block .warmup-text .warmup-step .step-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; line-height: 22px;
  background: var(--accent); color: #fff; border-radius: 50%;
  text-align: center; font-size: 0.7rem; margin-right: 8px;
  font-weight: 600; flex-shrink: 0; vertical-align: middle;
}

// --- 简单确定性哈希 ---
function hashCode(s) { let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return Math.abs(h); }

// --- 器材匹配检查 ---
function equipmentMatches(ex, equipSetting) {
  if (equipSetting === 'full_gym') return true;
  if (equipSetting === 'barbell_dumbbell') return ex.equipment.some(e => ['barbell','dumbbell','bodyweight'].includes(e));
  if (equipSetting === 'bodyweight') return ex.equipment.some(e => ['bodyweight','bands'].includes(e));
  if (equipSetting === 'bands') return ex.equipment.some(e => ['bands','bodyweight'].includes(e));
  return true;
}

// --- 选择训练分化 ---
function selectSplit(daysPerWeek, experience) {
  if (daysPerWeek <= 3) return 'fullbody';
  if (daysPerWeek === 4) return 'upperlower';
  if (experience === 'advanced' && daysPerWeek >= 5) return 'brosplit';
  return 'ppl';
}

// --- 生成一周的训练日程 ---
function generateSchedule(settings) {
  const splitKey = selectSplit(settings.daysPerWeek, settings.experience);
  const template = SPLIT_TEMPLATES[splitKey];
  const n = settings.daysPerWeek;
  const days = {};

  for (let i = 0; i < n; i++) {
    const tplDay = template.days[i % template.days.length];
    const availableDays = Object.entries(settings.trainingDays)
      .filter(([wd, enabled]) => enabled && parseInt(wd) > 0)
      .map(([wd]) => parseInt(wd))
      .sort();
    let wd;
    if (availableDays.length >= n) {
      wd = availableDays[i % availableDays.length];
    } else if (availableDays.length > 0) {
      wd = availableDays[i % availableDays.length];
    } else {
      wd = ((i) % 6) + 1;
    }

    const dayKey = 'day' + (i + 1);
    days[dayKey] = {
      weekday: wd,
      label: ['','周一','周二','周三','周四','周五','周六','周日'][wd],
      short: tplDay.short,
      name: tplDay.label,
      focus: tplDay.patterns.slice(0,2).join('+'),
      location: 'gym',
      _patterns: tplDay.patterns,
      _splitName: template.name
    };
  }
  return { schedule: days, splitKey, splitName: template.name, dayCount: n };
}


// --- 目标权重：不同目标优先选择不同类型的动作 ---
// 权重 = 器材分(0-4) + 动作类型分(0-3)，分数越高越靠前
function goalWeight(ex, goal) {
  let equipScore = 0, typeScore = 0;
  const hasBarbell = ex.equipment.includes('barbell');
  const hasDumbbell = ex.equipment.includes('dumbbell');
  const hasMachine = ex.equipment.includes('machine') || ex.equipment.includes('cable');
  const hasBody = ex.equipment.includes('bodyweight');
  const hasBand = ex.equipment.includes('bands');

  if (goal === 'strength') {
    // 力量：杠铃 > 哑铃 > 器械 > 自重/弹力带
    if (hasBarbell) equipScore = 4;
    else if (hasDumbbell) equipScore = 3;
    else if (hasMachine) equipScore = 2;
    else if (hasBody || hasBand) equipScore = 1;
    // 类型：复合主项 > 复合辅项 > 孤立 > 其它
    if (ex.mechanic === 'compound' && ex.category === 'main') typeScore = 3;
    else if (ex.mechanic === 'compound') typeScore = 2;
    else if (ex.mechanic === 'isolation') typeScore = 1;
  } else if (goal === 'hypertrophy') {
    // 增肌：杠铃/哑铃 > 器械/绳索 > 自重 > 弹力带
    if (hasBarbell || hasDumbbell) equipScore = 4;
    else if (hasMachine) equipScore = 3;
    else if (hasBody) equipScore = 2;
    else if (hasBand) equipScore = 1;
    // 类型：主项=孤立辅助 > 复合辅项 > 纠正 > 核心
    if (ex.category === 'main') typeScore = 3;
    else if (ex.category === 'accessory' && ex.mechanic === 'isolation') typeScore = 3;
    else if (ex.category === 'accessory') typeScore = 2;
    else if (ex.category === 'corrective') typeScore = 1;
  } else if (goal === 'endurance') {
    // 耐力：自重 > 弹力带 > 器械 > 哑铃 > 杠铃（高次数安全优先）
    if (hasBody) equipScore = 4;
    else if (hasBand) equipScore = 3;
    else if (hasMachine) equipScore = 2;
    else if (hasDumbbell) equipScore = 1;
    // 类型：核心/纠正/孤立 > 复合（高次数下孤立更安全）
    if (ex.category === 'core' || ex.category === 'corrective') typeScore = 3;
    else if (ex.mechanic === 'isolation') typeScore = 2;
    else if (ex.category === 'main') typeScore = 1;
  } else { // general: 均衡
    if (hasBarbell || hasDumbbell) equipScore = 4;
    else if (hasMachine) equipScore = 3;
    else if (hasBody) equipScore = 2;
    else if (hasBand) equipScore = 1;
    if (ex.category === 'main') typeScore = 3;
    else if (ex.category === 'accessory') typeScore = 2;
    else if (ex.category === 'core' || ex.category === 'corrective') typeScore = 1;
  }
  return equipScore + typeScore;
}

      return ex.movementPattern === 'core' && equipmentMatches(ex, equipment);
    }
    if (pattern === 'carry') {
      return ex.movementPattern === 'carry' && equipmentMatches(ex, equipment);
    }
    return ex.movementPattern === pattern && ex.mechanic === 'compound' && equipmentMatches(ex, equipment);
  });

  let filtered = candidates;
  if (experience === 'beginner') {
    filtered = candidates.filter(ex => ex.level === 'beginner' || ex.level === 'intermediate');
  }
  if (experience === 'intermediate') {
    filtered = candidates.filter(ex => ex.level !== 'advanced');
  }

  const seed = hashCode('' + weekSeed + dayIdx + patIdx);
  filtered.sort((a, b) => {
    const wa = goalWeight(a, goal);
    const wb = goalWeight(b, goal);
    if (wa !== wb) return wb - wa; // 权重高的靠前
    return hashCode(a.id + seed) - hashCode(b.id + seed);
  });

  return filtered;
}

// --- 生成一天的训练 ---
function generateDayPlan(dayKey, weekNumber, settings, excludeIds) {
  const schedule = generateSchedule(settings);
  const dayInfo = schedule.schedule[dayKey];
  if (!dayInfo) return null;

  const goalParams = GOAL_PARAMS[settings.goal] || GOAL_PARAMS.hypertrophy;
  const cycleWeek = ((weekNumber - 1) % 4) + 1;
  const cycleMod = CYCLE_MODIFIERS[cycleWeek];
  const isDeload = (cycleWeek === 4);

  const exercises = [];
  const usedExIds = new Set(excludeIds || []);

  // Session length: limit number of patterns (exercises)
  const sl = settings.sessionLength || 60;
  let patternLimit = dayInfo._patterns.length;
  if (sl <= 30) patternLimit = Math.max(2, Math.ceil(dayInfo._patterns.length * 0.5));
  else if (sl <= 45) patternLimit = Math.max(3, Math.ceil(dayInfo._patterns.length * 0.75));
  // 60 min = all, 90 min = all
  const activePatterns = dayInfo._patterns.slice(0, patternLimit);

  activePatterns.forEach((pattern, patIdx) => {
    const candidates = filterByPattern(pattern, settings.equipment, settings.experience, settings.goal, weekNumber, parseInt(dayKey.replace('day','')), patIdx);

    let picked = null;
    for (const ex of candidates) {
      if (!usedExIds.has(ex.id)) {
        picked = ex;
        usedExIds.add(ex.id);
        break;
      }
    }
    if (!picked && candidates.length > 0) {
      picked = candidates[0];
    }
    if (!picked) return;

    const rawSets = goalParams.sets;
    let sets = Math.round(rawSets * cycleMod.setsMul);
    sets = Math.max(isDeload ? 2 : 3, Math.min(sets, isDeload ? 4 : 6));

    const repParts = goalParams.repRange.split('-').map(Number);
    const repBias = cycleMod.repBias;
    const lowRep = Math.max(1, repParts[0] + repBias);
    const highRep = Math.max(lowRep + 1, (repParts[1] || repParts[0]) + repBias);
    const reps = lowRep === highRep ? String(lowRep) : lowRep + '-' + highRep;

    const rpeParts = goalParams.rpeRange.split('-').map(Number);
    const rpeLow = Math.max(5, (rpeParts[0] || 6) + cycleMod.rpeAdj);
    const rpeHigh = Math.max(rpeLow, (rpeParts[1] || rpeParts[0]) + cycleMod.rpeAdj);
    const rpe = rpeLow === rpeHigh ? String(rpeLow) : rpeLow + '-' + rpeHigh;

    const rest = goalParams.rest;

    let cat = '辅项';
    if (picked.category === 'main') cat = '主项';
    if (picked.category === 'corrective') cat = '纠正';
    if (picked.category === 'core') cat = '核心';

    exercises.push({
      id: picked.id.replace(/[^a-z0-9_]/g, '_').slice(0, 4),
      name: picked.name,
      cat,
      sets,
      reps,
      rest,
      rpe,
      note: picked.note || '',
      _exDbId: picked.id
    });
  });

  return {
    dayInfo: {
      weekday: dayInfo.weekday,
      label: dayInfo.label,
      short: dayInfo.short,
      name: dayInfo.name,
      focus: dayInfo.focus,
      location: dayInfo.location,
      _splitName: dayInfo._splitName,
    },
    exercises,
    warmup: goalParams.name === '力量'
      ? 'RAMP热身：跳绳3分钟 → 动态拉伸5分钟 → 轻热身组2分钟'
      : 'RAMP热身：跳绳/风阻单车3分钟 → 臀桥+开合+肩环绕+猫牛式5分钟 → 髋/胸椎/踝关节环绕5分钟 → 轻热身组2分钟',
    isDeload,
    cycleWeek,
    splitName: schedule.splitName,
  };
}

// ============================================================================
// 极限重量 (1RM) — RPE→百分比换算 & 推荐重量计算
// ============================================================================
const ONE_RM_DEFS = [
  { key: 'bench',     label: '杠铃卧推',       keywords: ['窄距卧推', '卧推'], ratio: 0.9 },
  { key: 'squat',     label: '杠铃深蹲',       keywords: ['高脚杯深蹲', '深蹲'], ratio: 0.85 },
  { key: 'deadlift',  label: '六角杠硬拉',     keywords: ['硬拉'], ratio: 1.0 },
  { key: 'ohp',       label: '杠铃站姿推举',   keywords: ['借力推举', '推举'], ratio: 0.85 },
  { key: 'row',       label: '杠铃俯身划船',   keywords: ['绳索划船', '俯身划船', '划船'], ratio: 0.8 },
  { key: 'rdl',       label: '罗马尼亚硬拉',   keywords: ['罗马尼亚硬拉', '罗马尼亚'], ratio: 0.9 },
  { key: 'pullup',    label: '引体向上',       keywords: ['引体向上', '高位下拉'], ratio: 0.85 },
  { key: 'dip',       label: '双杠臂屈伸',     keywords: ['臂屈伸', '双杠'], ratio: 0.9 },
  { key: 'bulgarian', label: '保加利亚分腿蹲', keywords: ['保加利亚分腿蹲', '分腿蹲'], ratio: 0.7 },
  { key: 'hipthrust', label: '杠铃臀推',       keywords: ['臀推', '臀桥'], ratio: 0.85 }
];

// 需要排除的辅项关键词（不计算推荐重量）
const SKIP_RM_KEYWORDS = ['侧平举', '面拉', '弯举', '提踵', '腿弯举', '山羊挺身', '农夫行走',
  '俯卧撑', '肩外旋', '下巴回缩', '悬垂', '死虫', '帕洛夫', '健腹轮', 'Y字', '举腿', '平板'];

function rpeToPercent(rpeStr) {
  // 处理 RPE 字符串如 "7-8.5", "8", "爆发", "-"
  if (!rpeStr || rpeStr === '-' || rpeStr === '最大速度') return null;
  if (rpeStr.includes('爆发')) return { pct: 60, low: 60, high: 60 };
  // 提取数字部分
  const nums = rpeStr.match(/[\d.]+/g);
  if (!nums || nums.length === 0) return null;
  const values = nums.map(Number);
  const min = Math.min(...values);
  const max = Math.max(...values);
  // RPE → 1RM%: % = 55 + RPE × 2.5 (近似)
  const toPct = rpe => Math.round((55 + rpe * 2.5) * 2) / 2;
  const lowPct = toPct(min);
  const highPct = toPct(max);
  const midPct = Math.round((lowPct + highPct) / 2 * 2) / 2;
  return { pct: midPct, low: lowPct, high: highPct, minRpe: min, maxRpe: max };
}

function matchExerciseTo1RM(exName, oneRM) {
  if (!oneRM || Object.keys(oneRM).length === 0) return null;
  // 检查是否在排除列表中
  for (const kw of SKIP_RM_KEYWORDS) {
    if (exName.includes(kw)) return null;
  }
  // 按关键词匹配
  for (const def of ONE_RM_DEFS) {
    if (!oneRM[def.key] || oneRM[def.key] <= 0) continue;
    for (const kw of def.keywords) {
      if (exName.includes(kw)) {
        return { key: def.key, oneRM: oneRM[def.key], ratio: def.ratio, label: def.label };
      }
    }
  }
  return null;
}

function calcRecommendedWeight(oneRM, rpeStr, isDeload) {
  const pctInfo = rpeToPercent(rpeStr);
  if (!pctInfo || !oneRM || oneRM <= 0) return null;
  let base = oneRM * pctInfo.pct / 100;
  let low = oneRM * pctInfo.low / 100;
  let high = oneRM * pctInfo.high / 100;
  // 减量周打 65 折
  if (isDeload) { base *= 0.65; low *= 0.65; high *= 0.65; }
  // 取整到 2.5kg
  const round = v => Math.round(v / 2.5) * 2.5;
  base = round(base);
  low = round(low);
  high = round(high);
  if (low === high) {
    return { text: `${base} kg`, base, low, high, isRange: false };
  }
  return { text: `${low}-${high} kg`, base, low, high, isRange: true };
}

function getProgressionHint(matchResult, dayId, currentWeek, allData) {
  if (!matchResult || !allData || currentWeek <= 1) return null;
  // 查找上一周同一天的记录
  const prevWeek = currentWeek - 1;
  const startDate = settings.startDate;
  const dayInfo = generateSchedule(settings).schedule[dayId];
  if (!dayInfo) return null;
  const prevWeekStart = dateAddDays(startDate, (prevWeek - 1) * 7);
  const prevWeekStartWD = getWeekdayNum(prevWeekStart);
  const daysToAdd = (dayInfo.weekday - prevWeekStartWD + 7) % 7;
  const prevDate = dateAddDays(prevWeekStart, daysToAdd);
  const prevSession = allData[prevDate] && allData[prevDate][dayId];
  if (!prevSession || !prevSession.exercises) return null;
  // 找到匹配的动作
  let allChecked = false;
  for (const [exId, record] of Object.entries(prevSession.exercises)) {
    const sets = record.sets || [];
    if (sets.length === 0) continue;
    // Check if this exId name matches (look up from generated plan)
    const prevDayData = generateDayPlan(dayId, prevWeek, settings);
    if (!prevDayData) continue;
    const exDef = prevDayData.exercises.find(e => e.id === exId);
    if (!exDef) continue;
    const exMatch = matchExerciseTo1RM(exDef.name, settings.oneRM);
    if (exMatch && exMatch.key === matchResult.key) {
      allChecked = sets.every(s => s.checked);
      break;
    }
  }
  if (!allChecked) return null;
  // 下肢动作 +5kg，上肢 +2.5kg
  const lowerKeys = ['squat', 'deadlift', 'rdl', 'bulgarian'];
  const inc = lowerKeys.includes(matchResult.key) ? 5 : 2.5;
  return { increment: inc, note: `↑ +${inc}kg` };
}

function getCurrentWeek() {
  const start = settings.startDate;
  const today = getTodayStr();
  const diff = diffDays(start, today);
  if (diff < 0) return 1;
  return Math.max(1, Math.floor(diff / 7) + 1);
}

function getPhaseForWeek(week) {
  // Dynamic system: phase is derived from 4-week cycle blocks (0-indexed)
  return Math.floor((week - 1) / 4);
}

function getGoalLabel(goal) {
  const map = { strength: '力量期', hypertrophy: '增肌期', endurance: '耐力期', general: '综合体能期' };
  return map[goal] || '增肌期';
}

function getDayData(phaseIdx, dayId, week) {
  // Dynamic generation — phaseIdx is ignored; dayId + week + settings determine the plan
  const w = (week !== undefined && week > 0) ? week : appState.selectedWeek;
  const result = generateDayPlan(dayId, w, settings);
  return result;
}

// ============================================================================
// 根据日期找到对应的训练日
// ============================================================================
function getTrainingDayForDate(dateStr) {
  const wd = getWeekdayNum(dateStr);
  const schedule = generateSchedule(settings).schedule;
  for (const [key, day] of Object.entries(schedule)) {
    if (day.weekday === wd && settings.trainingDays[wd]) {
      return key;
    }
  }
  return null;
}

  // Dynamic schedule based on settings
  const dynamicSchedule = generateSchedule(settings);
  const allEntries = Object.entries(dynamicSchedule.schedule);

  // 根据 settings.trainingDays 过滤：只显示被勾选的训练日
  const activeEntries = allEntries.filter(([key, day]) => settings.trainingDays[day.weekday]);

  // 兜底：如果全部取消勾选，显示所有训练日避免空白
  const entries = activeEntries.length > 0 ? activeEntries : allEntries;

  // 如果当前选中的 day 被过滤掉了，自动切换到第一个可用 day
  if (!entries.some(([key]) => key === appState.selectedDay)) {
    appState.selectedDay = entries[0][0];
  }

  let html = '';
  for (const [key, day] of entries) {
    const isActive = key === appState.selectedDay;
    const isToday = key === todayDay;
    let cls = '';
    if (isActive) cls += ' active';
    if (isToday && !isActive) cls += ' today';
    html += `<button class="${cls}" data-day="${key}"><span style="font-size:1.1rem;">${dayIcons[key]||'🏋️'}</span> ${day.short}<br><small>${day.name}</small></button>`;
  }
  nav.innerHTML = html;

  // Click handlers
  nav.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      appState.selectedDay = btn.dataset.day;
      renderAll();
    });
  });
}

function renderTrainingView() {
  const week = appState.selectedWeek;
  const dayId = appState.selectedDay;

  // Dynamic generation

  const dynamicSchedule = generateSchedule(settings);
  const dayInfo = dynamicSchedule.schedule[dayId];

  // 如果该训练日对应的星期几未被勾选（属于用户标记的非训练日）

    document.getElementById('dayLocation').textContent = '健身房';
    document.getElementById('dayLocation').className = 'location gym';
    document.getElementById('warmupBlock').innerHTML = '';
    document.getElementById('completionFill').style.width = '0%';
    document.getElementById('completionLabel').textContent = '';
    document.getElementById('dayDate').textContent = '';
    currentTrainingDate = null;
    currentDayId = null;
    return;
  }

  document.getElementById('dayTitle').textContent = `${dayInfo.short}：${dayInfo.name}`;
  document.getElementById('dayLocation').textContent = '健身房';
  document.getElementById('dayLocation').className = 'location gym';

  // Calculate what date this training day falls on
  const startDate = settings.startDate;
  const dayWeekday = dayInfo.weekday;
  const weekStart = dateAddDays(startDate, (week - 1) * 7);
  const weekStartWD = getWeekdayNum(weekStart);
  const daysToAdd = (dayWeekday - weekStartWD + 7) % 7;
  const trainingDate = dateAddDays(weekStart, daysToAdd);
  document.getElementById('dayDate').textContent = `${trainingDate} ${getWeekdayStr(trainingDate)}`;

  // 追踪当前训练日状态（供 saveCurrentRecords / 事件委托使用）
  currentTrainingDate = trainingDate;
  currentDayId = dayId;

  // Warmup — from generated plan
  const warmupText = planResult.warmup || '';
  const warmupSteps = warmupText
    .replace(/^RAMP热身：/, '')
    .split('→')
    .map(s => s.trim())
    .filter(Boolean);
  document.getElementById('warmupBlock').innerHTML = `
    <div class="warmup-header"><strong>🧢 RAMP 热身</strong><span class="warmup-toggle">${warmupCollapsed ? '展开 ▼' : '收起 ▲'}</span></div>
    <div class="warmup-text">
      ${warmupSteps.map((s, i) => `<div class="warmup-step"><span class="step-num">${i+1}</span>${s}</div>`).join('')}
    </div>`;
  if (warmupCollapsed) document.getElementById('warmupBlock').classList.add('collapsed');

  // Exercises — apply readiness adjustment
  let exercises = planResult.exercises;
  const readiness = appState.readiness || 'high';
  if (readiness === 'medium') {
    exercises = exercises.map(ex => ({ ...ex, sets: Math.max(2, ex.sets - 1) }));
  } else if (readiness === 'low') {
    // Light recovery: only 3 bodyweight-focused exercises, low volume
    exercises = exercises.slice(0, 3).map(ex => ({ ...ex, sets: 2, rpe: '5-6', note: (ex.note||'') + ' [恢复日 - 轻量]' }));
  }
  const isDeload = planResult.isDeload;

  // Check if there's saved data for this date+day
  const allData = loadData();
  const savedSession = allData[trainingDate] && allData[trainingDate][dayId]
    ? allData[trainingDate][dayId]
    : null;

  let html = '';
  let completedCount = 0;

  exercises.forEach((ex, idx) => {
    const catClass = ex.cat === '核心' ? 'core' : ex.cat === '纠正' ? 'correct' : '';

    // Check if this exercise has saved records
    let savedRecord = null;
    let savedSets = [];
    if (savedSession && savedSession.exercises && savedSession.exercises[ex.id]) {
      savedRecord = savedSession.exercises[ex.id];
      savedSets = savedRecord.sets || [];
    }
    const hasRecords = savedSets.some(s => s.weight || s.reps || s.rpe || s.checked);
    if (hasRecords) completedCount++;

    // 推荐重量计算
    const rmMatch = matchExerciseTo1RM(ex.name, settings.oneRM);
    let recHtml = '', recText = null;
    if (rmMatch) {
      const rec = calcRecommendedWeight(rmMatch.oneRM * rmMatch.ratio, ex.rpe, isDeload);
      if (rec) {
        recText = rec.text;
        const prog = getProgressionHint(rmMatch, dayId, week, allData);
        const deloadCls = isDeload ? ' deload' : '';
        const progBadge = prog ? `<span class="progression-badge">${prog.note}</span>` : '';
        recHtml = `<span class="rec-weight${deloadCls}">🎯 ${isDeload ? '减量 ' : ''}${rec.text}${progBadge}</span>`;
      }
    }

    html += `
    <div class="exercise-card${hasRecords ? ' expanded' : ''}" data-ex-id="${ex.id}">
      <div class="ex-top">
        <div>
          <span class="ex-name">${idx+1}. ${ex.name}</span>
        </div>
        <span class="ex-cat ${catClass}">${ex.cat}</span>
        ${hasRecords ? '<span style="font-size:0.8rem;margin-left:4px;">✅</span>' : ''}
      </div>
      <div class="ex-target">
        <span>📐 ${ex.sets}×${ex.reps}</span>
        <span>⏱ ${ex.rest}秒</span>
        <span>💪 RPE ${ex.rpe}</span>
        ${recHtml}
      </div>
      ${ex.note ? `<div class="ex-notes">💡 ${ex.note}</div>` : ''}
      ${hasRecords ? '' : '<div class="record-hint">👆 点击展开记录重量和次数</div>'}
      <div class="record-area">
        ${renderRecordArea(ex, savedRecord, recText)}
      </div>
    </div>`;
  });

  const _scrollY = window.scrollY;
  document.getElementById('exerciseList').innerHTML = html;
  requestAnimationFrame(() => { if (_scrollY > 0) window.scrollTo(0, _scrollY); });

  // Completion bar
  const pct = exercises.length > 0 ? Math.round((completedCount / exercises.length) * 100) : 0;
  document.getElementById('completionFill').style.width = pct + '%';
  document.getElementById('completionLabel').textContent = completedCount > 0 ? `✅ ${completedCount}/${exercises.length} 项已完成` : '';
}

function renderRecordArea(ex, savedRecord, recWeightText) {
  const targetSets = typeof ex.sets === 'number' ? ex.sets : (typeof ex.sets === 'string' ? parseInt(ex.sets) : 3);
  const record = savedRecord || {};
  const saved = record.sets || [];
  const savedNotes = record._notes || '';
  const setCount = Math.max(targetSets, saved.length || targetSets);
  const weightPlaceholder = recWeightText || '重量kg';

  let html = '';
  for (let i = 0; i < setCount; i++) {
    const s = saved[i] || { weight: '', reps: '', rpe: '' };
    const hasData = s.weight !== '' || s.reps !== '' || s.rpe !== '';
    const isChecked = s.checked || (s.weight !== '' && s.reps !== '');
    html += `
    <div class="set-row${hasData ? ' has-data' : ''}">
      <span class="set-label">#${i+1}</span>
      <input type="number" placeholder="${weightPlaceholder}" value="${s.weight}" data-ex="${ex.id}" data-set="${i}" data-field="weight" step="0.5" min="0" style="flex:1">
      <span class="input-label">kg</span>
      <input type="number" placeholder="次数" value="${s.reps}" data-ex="${ex.id}" data-set="${i}" data-field="reps" min="0" style="flex:0.8">
      <span class="input-label">次</span>
      <input type="number" placeholder="RPE" value="${s.rpe}" data-ex="${ex.id}" data-set="${i}" data-field="rpe" step="0.5" min="0" max="10" style="flex:0.7">
      <button class="set-done-btn${isChecked ? ' checked' : ''}" data-ex="${ex.id}" data-set="${i}" title="标记完成">✓</button>
    </div>`;
  }
  html += `<button class="add-set-btn" data-ex="${ex.id}">+ 添加一组</button>`;
  html += `<input class="ex-notes-input" placeholder="备注（如：底部停顿可再深一点）" value="${savedNotes}" data-ex="${ex.id}" data-field="notes">`;

  return html;
}

function getOrCreateSession(allData, dateStr, dayId) {
  if (!allData[dateStr]) allData[dateStr] = {};
  if (!allData[dateStr][dayId]) allData[dateStr][dayId] = { exercises: {}, notes: '' };
  return allData[dateStr][dayId];
}

function saveCurrentRecords() {
  if (!currentTrainingDate || !currentDayId) return;
  const allData = loadData();
  const session = getOrCreateSession(allData, currentTrainingDate, currentDayId);

  document.querySelectorAll('.exercise-card').forEach(card => {
    const exId = card.dataset.exId;
    const sets = [];
    card.querySelectorAll('.set-row').forEach(row => {
      const inputs = row.querySelectorAll('input');
      const doneBtn = row.querySelector('.set-done-btn');
      if (inputs.length >= 3) {
        sets.push({
          weight: inputs[0].value,
          reps: inputs[1].value,
          rpe: inputs[2].value,
          checked: doneBtn ? doneBtn.classList.contains('checked') : false
        });
      }
    });
    const notesInput = card.querySelector('.ex-notes-input');
    const notes = notesInput ? notesInput.value : '';

    // Only save if there's data
    const hasData = sets.some(s => s.weight || s.reps || s.rpe || s.checked);
    if (hasData || notes) {
      session.exercises[exId] = { sets, _notes: notes };
    }
  });

  session.savedAt = new Date().toISOString();
  saveData(allData);
}

function renderHistoryView() {
  const allData = loadData();
  const dates = Object.keys(allData).sort().reverse();

  // Summary
  const totalSessions = dates.reduce((sum, d) => sum + Object.keys(allData[d]).length, 0);
  const totalDays = dates.length;

  // Calculate streak
  let streak = 0;
  const today = getTodayStr();
  let checkDate = today;
  while (true) {
    const td = getTrainingDayForDate(checkDate);
    if (td && allData[checkDate] && allData[checkDate][td]) {
      streak++;
      checkDate = dateAddDays(checkDate, -1);
    } else if (!td) {
      checkDate = dateAddDays(checkDate, -1); // skip rest days
    } else {
      break;
    }
  }

  document.getElementById('historySummary').innerHTML = `
    <div class="stat"><div class="val">${totalSessions}</div><div class="lbl">🏋️ 总训练次数</div></div>
    <div class="stat"><div class="val">${totalDays}</div><div class="lbl">📅 训练天数</div></div>
    <div class="stat"><div class="val">${streak}</div><div class="lbl">🔥 连续训练</div></div>
  `;

  // History list
  if (dates.length === 0) {
    document.getElementById('historyList').innerHTML = '<div class="empty-state"><div class="icon">📝</div>暂无训练记录<br>开始训练后这里会显示历史</div>';
  } else {
    let html = '';
    dates.forEach(date => {
      const days = Object.keys(allData[date]);
      days.forEach(dayId => {
        const session = allData[date][dayId];
        const dayInfo = generateSchedule(settings).schedule[dayId];
        const exCount = Object.keys(session.exercises).length;
        const totalSets = Object.values(session.exercises).reduce((s, ex) => s + (ex.sets ? ex.sets.length : 0), 0);
        const recordedEx = Object.values(session.exercises).filter(ex => ex.sets && ex.sets.some(s => s.weight || s.reps || s.rpe)).length;
        html += `
        <div class="history-item" data-date="${date}" data-day="${dayId}">
          <div class="hi-date">${date} ${getWeekdayStr(date)}</div>
          <div class="hi-day">${dayInfo ? dayInfo.short + '：' + dayInfo.name : dayId} · 🏋️ 健身房</div>
          <div class="hi-records">✅ ${recordedEx}/${exCount} 项已记录 · ${totalSets} 组</div>
        </div>`;
      });
    });
    document.getElementById('historyList').innerHTML = html;

    // Click handlers
    document.querySelectorAll('.history-item').forEach(item => {
      item.addEventListener('click', () => showHistoryDetail(item.dataset.date, item.dataset.day));
    });
  }
}

function showHistoryDetail(dateStr, dayId) {
  const allData = loadData();
  const session = allData[dateStr] && allData[dateStr][dayId];
  if (!session) return;

  const dayInfo = generateSchedule(settings).schedule[dayId];

  // Find the week for this date and generate plan
  const week = Math.floor(diffDays(settings.startDate, dateStr) / 7) + 1;
  const dayData = getDayData(0, dayId, week); // pass the historical week, not the current selected week

  let html = `
    <button class="close-btn" id="closeHistory">✕</button>
    <h3>${dateStr} ${getWeekdayStr(dateStr)}</h3>
    <p style="color:var(--text2);margin-bottom:12px;">${dayInfo ? dayInfo.short + '：' + dayInfo.name : dayId} · 健身房</p>
  `;

  if (dayData) {
    dayData.exercises.forEach(ex => {
      const record = session.exercises[ex.id];
      let setsHtml = '';
      if (record && record.sets && record.sets.length > 0) {
        setsHtml = record.sets.map((s, i) =>
          `<span style="color:var(--text)">#${i+1}: ${s.weight || '-'}kg × ${s.reps || '-'}次 @RPE ${s.rpe || '-'}</span>`
        ).join('<br>');
      } else {
        setsHtml = '<span style="color:var(--text2)">未记录</span>';
      }
      html += `
      <div class="hd-exercise">
        <div class="hd-name">${ex.name}</div>
        <div class="hd-sets">目标: ${ex.sets}×${ex.reps} @RPE ${ex.rpe}<br>实际:<br>${setsHtml}</div>
        ${record && record._notes ? `<div class="hd-notes">📝 ${record._notes}</div>` : ''}
      </div>`;
    });
  }

  document.getElementById('historyDetail').innerHTML = html;
  document.getElementById('historyOverlay').classList.add('active');

  document.getElementById('closeHistory').addEventListener('click', () => {
    document.getElementById('historyOverlay').classList.remove('active');
  });
  document.getElementById('historyOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
  });
}

function renderSettingsView() {
  document.getElementById("startDateInput").value = settings.startDate;

  const weekdays = ["周日","周一","周二","周三","周四","周五","周六"];
  let checksHtml = "";
  for (let i = 0; i < 7; i++) {
    const checked = settings.trainingDays[i] || false;
    checksHtml += `<span class="day-check${checked ? " checked" : ""}" data-wd="${i}">${weekdays[i]}</span>`;
  }
  document.getElementById("weekdayChecks").innerHTML = checksHtml;
  document.querySelectorAll(".day-check").forEach(check => {
    check.addEventListener("click", function() {
      const wd = parseInt(this.dataset.wd);
      settings.trainingDays[wd] = !settings.trainingDays[wd];
      saveSettings(settings);
      this.classList.toggle("checked");
      renderAll();
    });
  });

  // One-time bindings to avoid duplicate event listeners
  function bindSelect(id, key, renderCb) {
    const sel = document.getElementById(id);
    if (!sel) return;
    sel.value = settings[key];
    sel.addEventListener("change", function() {
      settings[key] = this.value;
      saveSettings(settings);
      if (renderCb) renderCb();
      else { renderDayNav(); renderTrainingView(); renderHeader(); }
    });
  }

  if (!_settingsInited) {
    // Static elements — bind once
    document.getElementById("startDateInput").addEventListener("change", function() {
      settings.startDate = this.value;
      saveSettings(settings);
      appState.selectedWeek = getCurrentWeek();
      renderAll();
    });

    document.getElementById("exportBtn").addEventListener("click", () => {
      const data = loadData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `训练记录_${getTodayStr()}.json`;
      a.click(); URL.revokeObjectURL(url);
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (confirm("确定要清除所有训练记录吗？此操作不可撤销。")) {
        saveData({});
        renderAll();
      }
    });

    // Training preferences binds
    bindSelect("goalSelect", "goal");
    bindSelect("equipmentSelect", "equipment");
    bindSelect("frequencySelect", "daysPerWeek", function() {
      settings.daysPerWeek = parseInt(settings.daysPerWeek);
      saveSettings(settings);
      const schedule = generateSchedule(settings).schedule;
      const keys = Object.keys(schedule);
      if (!keys.includes(appState.selectedDay)) {
        appState.selectedDay = keys[0];
      }
      renderAll();
    });
    bindSelect("experienceSelect", "experience");
    bindSelect("sessionLengthSelect", "sessionLength", function() {
      settings.sessionLength = parseInt(settings.sessionLength);
      saveSettings(settings);
      renderTrainingView();
    });

    _settingsInited = true;
  } else {
    // Sync select values with current settings (no new listeners)
    document.getElementById("goalSelect").value = settings.goal;
    document.getElementById("equipmentSelect").value = settings.equipment;
    document.getElementById("frequencySelect").value = settings.daysPerWeek;
    document.getElementById("experienceSelect").value = settings.experience;
    document.getElementById("sessionLengthSelect").value = settings.sessionLength;
  }

  // 1RM grid (DOM rebuilt each call, old listeners destroyed)
  const rmGrid = document.getElementById("oneRmGrid");
  let rmHtml = "";
  ONE_RM_DEFS.forEach(def => {
    const val = settings.oneRM[def.key] || "";
    rmHtml += `<div class="one-rm-item">
      <label>${def.label}</label>
      <input type="number" placeholder="1RM" value="${val}" data-rm="${def.key}" step="2.5" min="0">
      <span class="unit">kg</span>
    </div>`;
  });
  rmGrid.innerHTML = rmHtml;
  rmGrid.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("change", function() {
      const key = this.dataset.rm;
      const v = parseFloat(this.value);
      if (v > 0) { settings.oneRM[key] = v; }
      else { delete settings.oneRM[key]; }
      saveSettings(settings);
      renderTrainingView();
    });
  });
}

// 实时更新完成进度条（无需重渲染）
function updateCompletionBar() {

  });

function setupTrainingDelegation() {
  const tv = document.getElementById('trainingView');

  // 每日状态条点击处理
  const rb = document.getElementById('readinessBar');
  if (rb) {
    rb.querySelectorAll('.readiness-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        rb.querySelectorAll('.readiness-btn').forEach(b => {
          b.className = 'readiness-btn';
        });
        const level = this.dataset.level;
        if (level === 'high') this.className = 'readiness-btn active-green';
        else if (level === 'medium') this.className = 'readiness-btn active-yellow';
        else this.className = 'readiness-btn active-red';
        appState.readiness = level;
        renderTrainingView();
      });
    });
  }

  // 点击委托
  tv.addEventListener('click', function(e) {
    // 热身块折叠
    const wb = e.target.closest('.warmup-block');
    if (wb) {
      wb.classList.toggle('collapsed');
      const toggle = wb.querySelector('.warmup-toggle');
      if (toggle) toggle.textContent = wb.classList.contains('collapsed') ? '展开 ▼' : '收起 ▲';
      warmupCollapsed = wb.classList.contains('collapsed');
      return;
    }

    // 添加组按钮 — 需要重渲染以显示新行
    const addBtn = e.target.closest('.add-set-btn');
    if (addBtn) {
      e.stopPropagation();
      const exId = addBtn.dataset.ex;
      if (!currentTrainingDate || !currentDayId) return;
      saveCurrentRecords();
      const allData = loadData();
      const session = getOrCreateSession(allData, currentTrainingDate, currentDayId);
      const exData = session.exercises[exId] || { sets: [], _notes: '' };
      exData.sets.push({ weight: '', reps: '', rpe: '', checked: false });
      session.exercises[exId] = exData;
      saveData(allData);
      renderTrainingView(); // 需要重渲染以显示新行
      // 自动展开卡片以显示新增行
      const newCard = document.querySelector(`.exercise-card[data-ex-id="${exId}"]`);
      if (newCard && !newCard.classList.contains('expanded')) {
        newCard.classList.add('expanded');
        const hint = newCard.querySelector('.record-hint');
        if (hint) hint.style.display = 'none';
      }
      return;
    }

    // 完成组勾选按钮 — 静默保存，不重渲染
    const doneBtn = e.target.closest('.set-done-btn');
    if (doneBtn) {
      e.stopPropagation();
      doneBtn.classList.toggle('checked');
      // 同步更新父行样式
      const row = doneBtn.closest('.set-row');
      if (row) {
        const inputs = row.querySelectorAll('input');
        const hasData = Array.from(inputs).some(inp => inp.value !== '');
        if (hasData || doneBtn.classList.contains('checked')) {
          row.classList.add('has-data');
        } else {
          row.classList.remove('has-data');
        }
      }
      saveCurrentRecords();
      autoSaveIndicator();
      updateCompletionBar();
      return;
    }

    // 动作卡片展开/折叠 — 静默保存，纯 CSS 切换
    const card = e.target.closest('.exercise-card');
    if (card && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && !e.target.closest('button')) {
      // 先静默保存当前数据
      saveCurrentRecords();
      card.classList.toggle('expanded');
      // 更新记录提示可见性
      const hint = card.querySelector('.record-hint');
      if (hint) hint.style.display = card.classList.contains('expanded') ? 'none' : '';
    }
  });

  // 输入变更委托 — 静默自动保存（不重渲染，不打断输入）
  tv.addEventListener('change', function(e) {
    if (e.target.closest('.exercise-card')) {
      saveCurrentRecords();
      autoSaveIndicator();
      // 更新该行的 has-data 状态
      const row = e.target.closest('.set-row');
      if (row) {
        const inputs = row.querySelectorAll('input');
        const hasData = Array.from(inputs).some(inp => inp.value !== '');
        if (hasData) row.classList.add('has-data');
        else row.classList.remove('has-data');
      }
      updateCompletionBar();
    }
  });

  // 输入时更新行样式（不保存，仅视觉反馈）
  tv.addEventListener('input', function(e) {
    if (e.target.tagName === 'INPUT' && e.target.closest('.set-row')) {
      const row = e.target.closest('.set-row');
      const inputs = row.querySelectorAll('input');
      const hasData = Array.from(inputs).some(inp => inp.value !== '');
      if (hasData) row.classList.add('has-data');
      else row.classList.remove('has-data');
    }
  });
}

// ============================================================================
// PWA 自动更新机制
// ============================================================================
let _pendingUpdate = false;
let _waitingWorker = null;

function setupPwaUpdate() {
  if (!('serviceWorker' in navigator)) return;

  const banner = document.getElementById('updateBanner');
  const updateBtn = document.getElementById('updateBtn');
  const updateClose = document.getElementById('updateClose');

  function showUpdateBanner() {
    if (_pendingUpdate) return;
    _pendingUpdate = true;
    banner.classList.add('show');
  }

  function applyUpdate() {
    banner.classList.remove('show');
    _pendingUpdate = false;
    if (_waitingWorker) {
      _waitingWorker.postMessage('CLEAR_AND_SKIP');
    }
    // Reload once the new SW takes control
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
    // If controllerchange doesn't fire within 500ms, force reload
    setTimeout(() => {
      if (!refreshing) { refreshing = true; window.location.reload(); }
    }, 500);
  }

  updateBtn.addEventListener('click', applyUpdate);
  updateClose.addEventListener('click', () => {
    banner.classList.remove('show');
    _pendingUpdate = false;
    // Will show again on next update detection
    setTimeout(() => { _pendingUpdate = false; }, 30000);
  });

  navigator.serviceWorker.register('sw.js', { scope: './' }).then(reg => {
    // Check if there's already a waiting worker
    if (reg.waiting) {
      _waitingWorker = reg.waiting;
      showUpdateBanner();
    }

    // New worker found during registration
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (!newWorker) return;

      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          console.log('[PWA] 新版本已就绪，等待用户确认更新');
          _waitingWorker = newWorker;
          showUpdateBanner();
        }
      });
    });

    // Periodically check for updates (every 30 min for active users)
    setInterval(() => {
      reg.update().catch(() => {});
    }, 30 * 60 * 1000);

    // Also check when page becomes visible again
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        reg.update().catch(() => {});
      }
    });
  }).catch(() => {});
}

function init() {
  // 注册 Service Worker（PWA 离线缓存 / 自动更新）
  setupPwaUpdate();

  appState.selectedWeek = getCurrentWeek();

  // Auto-select today's training day
  const todayDay = getTrainingDayForDate(getTodayStr());
  if (todayDay) appState.selectedDay = todayDay;

  setupTrainingDelegation();
  renderAll();
}

init();
</script>
